<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Film Studio (Vertex AI)</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-900 text-white min-h-screen">
    <div class="container mx-auto px-4 py-8">
      <header class="mb-8 text-center">
        <h1
          class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500"
        >
          AI Film Studio
        </h1>
        <p class="text-gray-400 mt-2">
          Vertex AI Edition (Gemini 2.5 Pro + Imagen 3 + Veo)
        </p>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
        <!-- Left: Input Controls -->
        <section
          class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700"
        >
          <h2 class="text-xl font-semibold mb-4">New Project</h2>

          <form id="storyForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-300 mb-1"
                >Concept / Short Story</label
              >
              <textarea
                id="storyInput"
                rows="6"
                class="w-full bg-gray-700 border-gray-600 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition"
                placeholder="Enter your story idea here..."
              ></textarea>
            </div>

            <button
              type="submit"
              id="generateBtn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 flex items-center justify-center"
            >
              <span id="btnText">Generate Episode</span>
              <div
                id="btnSpinner"
                class="hidden ml-2 animate-spin h-5 w-5 text-white"
              >
                <svg class="circle" fill="none" viewBox="0 0 24 24">
                  <circle
                    class="opacity-25"
                    cx="12"
                    cy="12"
                    r="10"
                    stroke="currentColor"
                    stroke-width="4"
                  ></circle>
                  <path
                    class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8v8H4z"
                  ></path>
                </svg>
              </div>
            </button>

            <div
              id="statusMessage"
              class="text-center text-sm font-mono mt-2 min-h-[20px]"
            ></div>
          </form>
        </section>

        <!-- Right: Live Feed / Output -->
        <section
          class="bg-gray-800 p-6 rounded-xl shadow-lg border border-gray-700 relative overflow-hidden"
        >
          <h2 class="text-xl font-semibold mb-4">Production Status</h2>

          <div id="workflowSteps" class="space-y-3">
            <!-- Workflow Steps injected via JS -->
            <div
              class="step-item p-3 bg-gray-900 rounded border border-gray-700 opacity-50"
            >
              Waiting for job...
            </div>
          </div>

          <div
            id="finalOutput"
            class="hidden mt-6 pt-6 border-t border-gray-700"
          >
            <h3 class="text-lg font-bold text-green-400 mb-2">
              Final Cut Ready
            </h3>
            <video
              id="videoPlayer"
              controls
              class="w-full rounded-lg shadow-black shadow-2xl bg-black"
            >
              Your browser does not support the video tag.
            </video>
            <a
              id="downloadLink"
              href="#"
              class="block text-center mt-2 text-blue-400 hover:underline"
              >Download Video</a
            >
          </div>
        </section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
